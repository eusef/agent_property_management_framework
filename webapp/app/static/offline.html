<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline - Property Management</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f6f8fa;
            color: #1f2328;
        }
        .offline-card {
            text-align: center;
            padding: 48px 32px;
            max-width: 420px;
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
        }
        .offline-icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #656d76; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            display: inline-block;
            padding: 8px 24px;
            background: #0969da;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #0860ca; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">&#x1F50C;</div>
        <h1>Server Not Running</h1>
        <p>The Property Management server isn't running right now. Start it by double-clicking the START file in your project folder.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
