{# Legacy include-based tree node. Use file_tree_macros.html instead. #}
{% if node.is_dir %}
<details class="tree-dir" {% if current_path and current_path.startswith(node.rel_path) %}open{% endif %}>
    <summary>{{ node.name }}</summary>
    <div class="tree-children">
        {% for child_node in node.children %}
            {% with node=child_node %}
                {% include "components/file_tree_node.html" %}
            {% endwith %}
        {% endfor %}
    </div>
</details>
{% else %}
<a href="/file/{{ node.rel_path }}"
   class="tree-file {% if node.rel_path == current_path %}active{% endif %}"
   hx-get="/file/{{ node.rel_path }}"
   hx-target="#main"
   hx-push-url="true">
    {{ node.name }}
</a>
{% endif %}
